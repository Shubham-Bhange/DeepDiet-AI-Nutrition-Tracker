<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>DeepDiet - Register</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">

    <!-- NAV -->
    <div class="nav">
      <div class="brand">
        <div class="brand-badge">D</div>DeepDiet
      </div>
      <div class="nav-right">
        <a href="login.html">Login</a>
        <a class="active" href="register.html">Register</a>
      </div>
    </div>

    <!-- REGISTER CARD -->
    <div class="card" style="max-width:560px;margin:0 auto;">
      <h1 class="h1">Register</h1>
      <p class="p">Create your DeepDiet account.</p>

      <div style="margin-top:18px;display:grid;gap:12px;">

        <div>
          <label class="p"><b>Full Name</b></label>
          <input id="fullName" class="input" placeholder="Your name">
        </div>

        <div>
          <label class="p"><b>User ID</b></label>
          <input id="userId" class="input" placeholder="e.g., remo123">
        </div>

        <div>
          <label class="p"><b>Password</b></label>
          <input id="password" class="input" type="password" placeholder="Minimum 4 characters">
        </div>

        <button id="registerBtn" class="btn" type="button">Register</button>

        <p class="p" style="margin:0;">
          Already have an account?
          <a href="login.html" style="color:#bfdbfe;">Login</a>
        </p>

      </div>
    </div>

  </div>

  <!-- TOAST -->
  <div id="toastBox"
       style="position:fixed;
              bottom:18px;
              right:18px;
              z-index:9999;
              display:flex;
              flex-direction:column;
              gap:10px;
              max-width:320px;">
  </div>

  <!-- SCRIPTS -->
  <script src="toast.js"></script>

  <script>
  const API_BASE = "https://deepdiet-backend.onrender.com";

  document.addEventListener("DOMContentLoaded", () => {

    const registerBtn = document.getElementById("registerBtn");

    registerBtn.addEventListener("click", async () => {

      const fullName = document.getElementById("fullName").value.trim();
      const userId = document.getElementById("userId").value.trim();
      const password = document.getElementById("password").value;

      if (!fullName || !userId || !password) {
        showToast("Please fill all fields", "error");
        return;
      }

      if (password.length < 4) {
        showToast("Password must be at least 4 characters", "error");
        return;
      }

      try {

        const res = await fetch(`${API_BASE}/api/register`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            fullName,
            userId,
            password
          })
        });

        const data = await res.json();

        if (!data.ok) {
          showToast(data.msg || "Registration failed", "error");
          return;
        }

        showToast("Registered successfully ✅", "success");

        setTimeout(() => {
          window.location.href = "login.html";
        }, 800);

      } catch (err) {
        console.error(err);
        showToast("Server error. Try again.", "error");
      }

    });

  });
  </script>

</body>
</html>
