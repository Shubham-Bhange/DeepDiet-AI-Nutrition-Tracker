<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>DeepDiet - Login</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="nav">
      <div class="brand"><div class="brand-badge">D</div>DeepDiet</div>
      <div class="nav-right">
        <a class="active" href="login.html">Login</a>
        <a href="register.html">Register</a>
      </div>
    </div>

    <div class="card" style="max-width:560px;margin:0 auto;">
      <h1 class="h1">Login</h1>
      <p class="p">Login to save scans & track progress.</p>

      <div style="margin-top:18px;display:grid;gap:12px;">
        <div>
          <label class="p"><b>User ID</b></label>
          <input id="userId" class="input" placeholder="e.g., remo123">
        </div>

        <div>
          <label class="p"><b>Password</b></label>
          <input id="password" class="input" type="password" placeholder="min 4 characters">
        </div>

        <button id="loginBtn" class="btn" type="button">Login</button>
        <p class="p" style="margin:0;">New user? <a href="register.html" style="color:#bfdbfe;">Create account</a></p>
      </div>
    </div>

    <div id="toastBox" style="position:fixed; bottom:18px; right:18px; z-index:9999; display:flex; flex-direction:column; gap:10px; max-width:320px;"></div>
  </div>

  <script src="toast.js"></script>
  <script src="auth.js"></script>
  <script>
    document.getElementById("loginBtn").addEventListener("click", () => {
      const userId = document.getElementById("userId").value.trim();
      const password = document.getElementById("password").value;
      const res = loginUser({ userId, password });
      if (!res.ok) return showToast(res.msg, "error");
      showToast(res.msg, "success");
      setTimeout(() => window.location.href = "index.html", 700);
    });
  </script>
</body>
</html>
